<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftUI 컴포넌트 레퍼런스 | 개발자리</title>
  <meta name="description" content="SwiftUI 69개 컴포넌트 코드 레퍼런스. 검색, 카테고리 필터, Apple 공식 문서 링크 포함." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="assets/nav.js" defer></script>
  <style>
    /* ── Page Layout ── */
    .ref-hero {
      padding: 48px 40px 32px;
      max-width: 1400px; margin: 0 auto;
      position: relative; z-index: 1;
    }
    .ref-hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 800; letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .ref-hero h1 .accent { color: var(--orange); }
    .ref-hero p {
      color: var(--muted); font-size: 14px; margin-bottom: 28px;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative; max-width: 480px; margin-bottom: 20px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px 10px 40px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--orange); }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
    }
    .result-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--muted);
      margin-top: 6px; letter-spacing: .03em;
    }

    /* ── Filter Tabs ── */
    .filter-row {
      max-width: 1400px; margin: 0 auto;
      padding: 0 40px 24px;
      display: flex; gap: 8px; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .filter-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: .04em;
      cursor: pointer; color: var(--muted);
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--text); }
    .filter-btn.active {
      background: var(--orange); border-color: var(--orange);
      color: #fff; font-weight: 500;
    }
    .filter-btn .count {
      display: inline-block;
      background: rgba(255,255,255,.25);
      border-radius: 4px; padding: 0 5px;
      font-size: 10px; margin-left: 4px;
    }
    .filter-btn:not(.active) .count {
      background: var(--surface2); color: var(--muted);
    }

    /* ── Grid ── */
    .grid-wrap {
      max-width: 1400px; margin: 0 auto;
      padding: 0 40px 80px;
      position: relative; z-index: 1;
    }
    .comp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Component Card ── */
    .comp-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s, transform .15s;
      display: flex; flex-direction: column;
    }
    .comp-card:hover {
      border-color: var(--orange);
      transform: translateY(-2px);
    }
    .card-header {
      padding: 16px 18px 12px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .card-emoji {
      font-size: 28px; line-height: 1; flex-shrink: 0;
      margin-top: 2px;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: -.02em; margin-bottom: 2px;
    }
    .card-api {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--orange);
      margin-bottom: 4px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .badge-cat {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: .04em;
      padding: 2px 7px; border-radius: 5px;
      border: 1px solid;
    }
    .badge-avail {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted);
      background: var(--surface2);
      padding: 2px 7px; border-radius: 5px;
    }
    .card-desc {
      padding: 0 18px 12px;
      font-size: 13px; color: var(--muted);
      line-height: 1.6;
    }
    .card-code {
      margin: 0 14px 12px;
      background: #0f111a;
      border-radius: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      flex: 1;
      position: relative;
    }
    .card-code pre {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px; line-height: 1.7;
      color: #c9d1d9;
      margin: 0; white-space: pre;
    }
    /* Syntax highlighting */
    .kw  { color: #ff79c6; }  /* keywords */
    .str { color: #f1fa8c; }  /* strings */
    .num { color: #bd93f9; }  /* numbers */
    .cmt { color: #6272a4; font-style: italic; } /* comments */
    .typ { color: #8be9fd; }  /* types */
    .mdf { color: #50fa7b; }  /* modifiers */
    .dot { color: #ffb86c; }  /* dot chains */

    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: rgba(255,255,255,.5);
      cursor: pointer; transition: all .15s;
    }
    .copy-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .copy-btn.copied { color: #50fa7b; border-color: #50fa7b; }

    .card-footer {
      padding: 10px 18px 14px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-top: 1px solid var(--border);
    }
    .doc-link {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--blue);
      text-decoration: none; letter-spacing: .02em;
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px;
      background: var(--blue-dim);
      border-radius: 5px;
      transition: opacity .15s;
    }
    .doc-link:hover { opacity: .75; }
    .plat-icons { font-size: 11px; margin-left: auto; align-self: center; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 20px;
      color: var(--muted); display: none;
    }
    .empty-state .big { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    @media (max-width: 768px) {
      .ref-hero { padding: 32px 20px 20px; }
      .filter-row { padding: 0 20px 20px; }
      .grid-wrap { padding: 0 20px 60px; }
      .comp-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<div class="ref-hero">
  <h1>SwiftUI <span class="accent">컴포넌트</span> 레퍼런스</h1>
  <p>Apple Component Gallery에서 발췌 · 69개 컴포넌트 · 코드 예제 + 공식 문서 링크</p>

</div>

// ── Syntax Highlighter ────────────────────────────────────────
function highlight(code) {
  const e = code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return e
    // Comments
    .replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>')
    // String literals
    .replace(/(&quot;[^&]*&quot;)/g, '<span class="str">$1</span>')
    // Keywords
    .replace(/\b(let|var|struct|class|func|return|if|else|switch|case|default|for|in|true|false|nil|some|async|await|@unknown|self)\b/g, '<span class="kw">$1</span>')
    // Types (capitalized)
    .replace(/\b([A-Z][A-Za-z0-9]+)\b/g, '<span class="typ">$1</span>')
    // Dot modifier chains
    .replace(/(\.[a-z][A-Za-z0-9]*)\(/g, '<span class="mdf">$1</span>(')
    // Numbers
    .replace(/\b(\d+(\.\d+)?)\b/g, '<span class="num">$1</span>');
}

// ── Render ────────────────────────────────────────────────────
const grid = document.getElementById('compGrid');
const filterRow = document.getElementById('filterRow');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');
const emptyState = document.getElementById('emptyState');

const CATS = ['All','Navigation','Forms','Data Display','Feedback','Actions','Layout'];
let activeFilter = 'All';
let searchQuery = '';

function getCatCounts() {
  const counts = {};
  CATS.forEach(c => {
    counts[c] = c === 'All' ? COMPONENTS.length
      : COMPONENTS.filter(x => x.cat === c).length;
  });
  return counts;
}

function renderFilters() {
  const counts = getCatCounts();
  filterRow.innerHTML = CATS.map(cat => {
    const active = activeFilter === cat ? ' active' : '';
    return `<button class="filter-btn${active}" data-cat="${cat}">
      ${cat}<span class="count">${counts[cat]}</span>
    </button>`;
  }).join('');
  filterRow.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.cat;
      renderFilters();
      renderCards();
    });
  });
}

function getFiltered() {
  return COMPONENTS.filter(c => {
    const catOk = activeFilter === 'All' || c.cat === activeFilter;
    const q = searchQuery.toLowerCase();
    const searchOk = !q ||
      c.name.toLowerCase().includes(q) ||
      c.id.toLowerCase().includes(q) ||
      c.swiftUI.toLowerCase().includes(q) ||
      c.desc.includes(q);
    return catOk && searchOk;
  });
}

function platIcon(plat) {
  const map = { iOS:"📱", macOS:"💻", watchOS:"⌚", tvOS:"📺" };
  return plat.map(p => map[p] || p).join(' ');
}

function renderCards() {
  const filtered = getFiltered();
  resultCount.textContent = `${filtered.length} / ${COMPONENTS.length} 개`;
  emptyState.style.display = filtered.length ? 'none' : 'block';
  grid.innerHTML = filtered.map(c => {
    const col = CAT_COLORS[c.cat] || {};
    const refs = REFS[c.id] || [];
    const docLinks = refs.map(r =>
      `<a class="doc-link" href="${r.url}" target="_blank" rel="noopener">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ${r.label}
      </a>`
    ).join('');

    return `<div class="comp-card">
      <div class="card-header">
        <div class="card-emoji">${c.emoji}</div>
        <div class="card-meta">
          <div class="card-name">${c.name}</div>
          <div class="card-api">${c.swiftUI}</div>
          <div class="card-badges">
            <span class="badge-cat" style="background:${col.bg||''};color:${col.text||''};border-color:${col.border||''}">${c.cat}</span>
            <span class="badge-avail">${c.avail}</span>
          </div>
        </div>
      </div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-code">
        <button class="copy-btn" onclick="copyCode(this, \`${c.code.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">복사</button>
        <pre>${highlight(c.code)}</pre>
      </div>
      ${docLinks || refs.length === 0 ? `<div class="card-footer">
        ${docLinks}
        <span class="plat-icons" title="${c.plat.join(', ')}">${platIcon(c.plat)}</span>
      </div>` : ''}
    </div>`;
  }).join('');
}

function copyCode(btn, code) {
  // Unescape the code
  const decoded = code.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '복사';
      btn.classList.remove('copied');
    }, 1500);
  });
}

searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});

renderFilters();
renderCards();
</script>
